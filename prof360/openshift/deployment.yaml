apiVersion: apps/v1
kind: Deployment
metadata:
  name: professional-app
  namespace: xlc-portfolio-dia-dev
  labels:
    app: professional-app
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: professional-app
  template:
    metadata:
      labels:
        app: professional-app
        env: dev
    spec:
      containers:
        - name: professional-app
          image: <YOUR_REGISTRY>/professional-app:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: ENV
              value: "dev"
